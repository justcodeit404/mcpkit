run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - gocritic
    - gocyclo
    - dupl
    - unconvert

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
