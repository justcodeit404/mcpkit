version: 2

project_name: mcpkit

before:
  hooks:
    - go mod tidy

builds:
  - id: mcpkit
    main: ./cmd/mcpkit
    binary: mcpkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/justcodeit404/mcpkit/internal/cli.Version={{.Version}}
      - -X github.com/justcodeit404/mcpkit/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/justcodeit404/mcpkit/internal/cli.BuildDate={{.Date}}
      - -X github.com/justcodeit404/mcpkit/internal/mcp.ClientVersion={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

release:
  github:
    owner: justcodeit404
    name: mcpkit
  prerelease: auto
  draft: false

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
